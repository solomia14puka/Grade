<!DOCTYPE html>
<html>
<head>
    <style>
        @media print {
            .no-print {
                display: none !important;
            }
        }
    </style>
    <meta charset="utf-8" />
    <title>Лабораторна робота 2</title>
    <style>
        table, th, td {
            border: 1px solid black;
            border-collapse: collapse;
            padding: 5px;
        }

        .modal {
            display: none;
            position: fixed;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
        }

        .modal-content {
            background-color: white;
            margin: 10% auto;
            padding: 20px;
            border: 1px solid black;
            width: 80%;
        }
    </style>
</head>
<body>

    <h1>Система отака</h1>
    <div id="user-info"></div>
    <button id="logout-btn" style="display:none;" onclick="logout()">Вийти з акаунту</button>
    <hr>

    <div id="loginBlock">
        <h3>Вхід у систему</h3>
        <input type="text" id="login-name" placeholder="Ваше ПІБ" required>
        <input type="password" id="login-password" placeholder="Пароль" required>
        <button onclick="login()">Увійти</button>
    </div>

    <div id="mainContent" style="display:none;">

        <div id="professorSidebar">
            <button onclick="showTab('faculties')">Факультети</button>
            <button onclick="showTab('departments')">Кафедри</button>
            <button onclick="showTab('subjects')">Предмети</button>
            <button onclick="showTab('students')">Студенти</button>
            <button onclick="showTab('grades')">Оцінки</button>
            <button onclick="openWorkCertificate()">Довідка з місця роботи</button>
        </div>
    <hr>
    <h2 id="section-title">Керування</h2>

    <div id="search-container" style="margin-bottom: 15px;">
        <label>Пошук: <input type="text" id="searchInput" oninput="filterTable()"></label>
    </div>
    <br>


        <div id="form-faculties" class="crud-form" style="display:none;">
            <input type="hidden" id="fac-id">
            <input type="text" id="fac-name" placeholder="Назва факультету">
            <button onclick="saveEntity('faculties')">Зберегти</button>
            <button onclick="cancelEdit('faculties')" id="cancel-fac" style="display:none;">Скасувати</button>
        </div>

        <div id="form-departments" class="crud-form" style="display:none;">
            <input type="hidden" id="dep-id">
            <input type="text" id="dep-name" placeholder="Назва кафедри">
            <select id="dep-facultyId"></select>
            <button onclick="saveEntity('departments')">Зберегти</button>
            <button onclick="cancelEdit('departments')" id="cancel-dep" style="display:none;">Скасувати</button>
        </div>

        <div id="form-subjects" class="crud-form" style="display:none;">
            <input type="hidden" id="sub-id">
            <input type="text" id="sub-name" placeholder="Назва предмета">
            <button onclick="saveEntity('subjects')">Зберегти</button>
            <button onclick="cancelEdit('subjects')" id="cancel-sub" style="display:none;">Скасувати</button>
        </div>

        <div id="form-students" class="crud-form" style="display:none;">
            <input type="hidden" id="stu-id">
            <input type="text" id="stu-name" placeholder="ПІБ">
            <input type="text" id="stu-pass" placeholder="Пароль">
            <select id="stu-departmentId"></select>
            <button onclick="saveEntity('students')">Зберегти</button>
            <button onclick="cancelEdit('students')" id="cancel-stu" style="display:none;">Скасувати</button>
        </div>

        <div id="form-grades" class="crud-form" style="display:none;">
            <input type="hidden" id="gra-id">
            <select id="gra-studentId"></select>
            <select id="gra-subjectId"></select>
            <select id="gra-professorId"></select>
            <input type="number" id="gra-value" placeholder="Оцінка">
            <input type="date" id="gra-date">
            <button onclick="saveEntity('grades')">Зберегти</button>
            <button onclick="cancelEdit('grades')" id="cancel-gra" style="display:none;">Скасувати</button>
        </div>

        <br>
        <table id="dataTable">
            <thead id="tableHead"></thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <div id="studentDashboard" style="display:none;">
        <h2>Кабінет студента</h2>
        <button onclick="showMyGrades()">Мої оцінки</button>
        <button onclick="showMyDynamics()">Динаміка успішності</button>
        <button onclick="openTranscript(null)">Мій витяг оцінок</button>
        <button onclick="openStudyCertificate()">Довідка про навчання</button>
        <hr>
        <div id="student-view-area"></div>
    </div>

    <div id="universalModal" class="modal">
        <div class="modal-content">
            <button onclick="closeModal()" style="float:right;">Закрити вікно</button>
            <div id="modal-body"></div>
            <hr>
            <button onclick="window.print()">Друкувати сторінку</button>
        </div>
    </div>

    <script src="js/lab2.js"></script>

    <div id="certModal" class="no-print" style="display:none; position:fixed; top:5%; left:15%; right:15%; bottom:5%; background:white; border:2px solid #333; box-shadow: 0 0 15px rgba(0,0,0,0.5); padding:30px; z-index:1000; overflow-y: auto;">
        <div style="text-align: right; margin-bottom: 20px;" class="no-print">
            <button onclick="window.print()" style="padding: 5px 15px; cursor: pointer;">🖨 Друк</button>
            <button onclick="document.getElementById('certModal').style.display='none'" style="padding: 5px 15px; cursor: pointer; background: #ff4c4c; color: white;">✖ Закрити</button>
        </div>

        <div id="certContent" style="font-family: 'Times New Roman', Times, serif; font-size: 18px; line-height: 1.6; color: black;"></div>
    </div>

</body>
</html>
